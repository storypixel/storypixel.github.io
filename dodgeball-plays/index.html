<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Dodgeball Play Animator</title>
<style>
  :root{--ink:#16181d;--muted:#5b626e;--line:#e6e8ec;--bg:#fff;--accent:#1f6feb;--accent-soft:#eef4ff}
  *{box-sizing:border-box}html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font:400 17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:600px;margin:0 auto;padding:22px 18px 40vh}
  header.top{padding:6px 0 14px;border-bottom:1px solid var(--line);margin-bottom:8px}
  header.top h1{font-size:1.5rem;line-height:1.25;margin:0 0 4px;letter-spacing:-.01em}
  header.top p{margin:0;color:var(--muted);font-size:.95rem}
  header.top a{color:var(--accent);text-decoration:none}
  h2.group{font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:34px 2px 0}
  .play{margin:16px 0 34px}
  footer{margin-top:10px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:.85rem}
  @media(min-width:760px){header.top h1{font-size:1.85rem}}
  @media(prefers-color-scheme:dark){
    :root{--ink:#e6e8ec;--muted:#aab2c0;--line:#2a2f3a;--bg:#0b0d11;--accent:#7aa2ff;--accent-soft:#171b22}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Dodgeball Play Animator</h1>
    <p>Scroll through the team calls &mdash; each one plays as it comes into view. From the <a href="/dodging-playbook">playbook</a>.</p>
  </header>

  <main id="doc"></main>

  <footer>Plays are the SAME canonical DBN files rendered in the <a href="/dodging-playbook">playbook</a> &mdash; one source of truth. Edit a play in <code>dodgeball-play-notation/examples/*.dbn</code>.</footer>
</div>

<script src="play-animator.js"></script>
<script src="dbn.js"></script>
<script>
  // Render the SAME .dbn plays the playbook uses (one canonical source), grouped
  // like the playbook's Offensive / Defensive calls. The .dbn files live in the
  // dodgeball-play-notation repo, served alongside this page under the same host.
  (function(){
    var BASE = '/dodgeball-play-notation/examples/';
    var GROUPS = [
      { title: 'Offensive calls', ids: ['pitch-back','three-ball','insides','outsides','kill-left','kill-right'] },
      { title: 'Defensive calls', ids: ['home','away','mirror','middle'] }
    ];
    var doc = document.getElementById('doc');
    var items = [];

    var chain = Promise.resolve();
    GROUPS.forEach(function(g){
      var h = document.createElement('h2'); h.className = 'group'; h.textContent = g.title;
      doc.appendChild(h);
      g.ids.forEach(function(id){
        var slot = document.createElement('div'); slot.className = 'play';
        doc.appendChild(slot);
        chain = chain.then(function(){
          return fetch(BASE + id + '.dbn').then(function(r){ return r.ok ? r.text() : null; }).then(function(t){
            if(!t) { slot.remove(); return; }
            var play = (window.DBN && window.DBN.parse) ? window.DBN.parse(t) : null;
            if(play && window.DodgeballPlay){
              var ctrl = DodgeballPlay.mount(slot, play, { autoplay:false, loop:true });
              items.push({ el: ctrl.el, ctrl: ctrl, ratio: 0 });
            } else { slot.remove(); }
          }).catch(function(){ slot.remove(); });
        });
      });
    });

    chain.then(function(){
      // Only one plays at a time: the most-visible inset auto-plays, the rest pause.
      var active = null;
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          var it = items.find(function(i){ return i.el === e.target; });
          if(it) it.ratio = e.isIntersecting ? e.intersectionRatio : 0;
        });
        var best = null;
        items.forEach(function(i){ if((i.ratio||0) > 0 && (!best || i.ratio > best.ratio)) best = i; });
        if(best && best !== active){
          if(active) active.ctrl.pause();
          active = best; active.ctrl.seek(0); active.ctrl.play();
        } else if(!best && active){ active.ctrl.pause(); active = null; }
      }, { threshold: [0, 0.25, 0.5, 0.75, 1] });
      items.forEach(function(i){ io.observe(i.el); });
    });
  })();
</script>
</body>
</html>
