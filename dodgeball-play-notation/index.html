<!DOCTYPE html>
<html lang="en" data-dbn-ready="0">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DBN Editor — Dodgeball Notation</title>
<meta name="description" content="Write a dodgeball play in DBN notation and watch it animate. Deep-linkable and agent-drivable.">
<style>
  /* ---- light tool palette (its own identity) ---- */
  :root {
    --bg:#f4f6f9; --surface:#ffffff; --line:#dfe3ea; --text:#1a1d23; --muted:#5b6470;
    --accent:#0f766e; --accent-soft:#d7f0ec; --err:#c0362c; --err-bg:#fdecea; --ok:#0a7d52;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; }
  body { font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }

  header { padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0 0 2px; font-weight:680; letter-spacing:-.01em; }
  header .sub { color:var(--muted); font-size:12.5px; }
  header a { color:var(--accent); text-decoration:none; font-weight:600; }

  /* ---- tabs (mobile-primary) ---- */
  .tabs { display:flex; gap:4px; padding:8px 12px 0; background:var(--surface); border-bottom:1px solid var(--line); }
  .tab { flex:1; appearance:none; border:1px solid var(--line); border-bottom:none;
         background:var(--bg); color:var(--muted); font:600 14px/1 inherit; padding:11px 10px;
         border-radius:9px 9px 0 0; cursor:pointer; }
  .tab.active { background:var(--surface); color:var(--text); box-shadow:inset 0 -2px 0 var(--accent); }

  /* ---- toolbar ---- */
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:10px 14px; background:var(--surface); border-bottom:1px solid var(--line); }
  .toolbar label { color:var(--muted); font-size:13px; }
  select, .btn { background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 11px; font:inherit; cursor:pointer; }
  select:hover, .btn:hover { border-color:var(--accent); }
  .btn { font-weight:600; }

  /* ---- panels ---- */
  main { display:block; }
  .panel { display:none; flex-direction:column; }
  .panel.play { display:flex; }                       /* preview is always visible */
  body.show-code .panel.notation { display:flex; }    /* code only when toggled on */
  #render-btn { display:none; }
  body.show-code #render-btn { display:inline-block; }
  .btn.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .panel.play .hint { color:var(--muted); font-size:12.5px; padding:12px 16px 6px; }
  .preview-wrap { padding:12px 14px 20px; }
  #stage { max-width:560px; margin:0 auto; }

  .panel.notation textarea { width:100%; min-height:44vh; resize:vertical; border:0; outline:0; padding:14px 16px;
    background:var(--surface); color:var(--text); font:13.5px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; tab-size:2; }
  .status { padding:9px 16px; border-top:1px solid var(--line); background:var(--surface);
    font:12.5px/1.4 ui-monospace,monospace; min-height:34px; color:var(--muted); }
  .status.ok { color:var(--ok); } .status.err { color:var(--err); }
  .error-panel { margin:0; padding:10px 16px; background:var(--err-bg); color:var(--err); border-top:1px solid var(--err);
    font:12.5px/1.45 ui-monospace,monospace; white-space:pre-wrap; }

  /* ---- override the vendored engine into the LIGHT theme (no dark canvas).
         The court is a light surface; contrast comes from a bold center line,
         the strong us-blue / them-red players, amber balls, and dark markers.
         Engine SVG elements have no per-type classes, so we restyle by element
         type from the editor side (the vendored engine itself is untouched). --- */
  .preview-wrap .dbp { background:var(--surface); color:var(--text); border-color:var(--line); max-width:560px; margin:0 auto; }
  .preview-wrap .dbp__badge { color:var(--muted); border-color:var(--line); }
  .preview-wrap .dbp__desc, .preview-wrap .dbp__step, .preview-wrap .dbp__hint { color:var(--muted); }
  .preview-wrap .dbp__call { color:var(--muted); }
  .preview-wrap .dbp__btn { background:#f1f3f6; border-color:var(--line); color:var(--text); }
  .preview-wrap .dbp__btn:hover { background:#e6e9ee; }
  .preview-wrap .dbp__loopwrap { color:var(--muted); }
  /* monochrome scrubber: light track, black fill + nodes + thumb */
  .preview-wrap .dbp__track { background:#e0e0e0; }
  .preview-wrap .dbp__fill { background:#111; }
  .preview-wrap .dbp__node { border-color:#111; background:var(--surface); }
  .preview-wrap .dbp__thumb { background:#111; box-shadow:0 0 0 2px var(--surface), 0 1px 3px rgba(20,30,50,.28); }
  /* the court is a chess-diagram board drawn by the engine (checkerboard + frame
     + coordinates); don't flatten its rects/lines from here. Only the red X. */
  .preview-wrap .dbp__stage line.dbp__outx { stroke:#e23150; }

  /* ---- desktop: hide tabs, show both panels side-by-side ---- */
  @media (min-width:1024px) {
    body.show-code main { display:grid; grid-template-columns: minmax(340px,1fr) minmax(380px,1.05fr); min-height:calc(100vh - 110px); }
    body.show-code .panel.notation { order:0; border-right:1px solid var(--line); }
    .panel.play { order:1; }
    .panel.notation textarea { flex:1; min-height:0; }
  }
</style>
</head>
<body>
<header>
  <h1>DBN Editor</h1>
  <div class="sub">write a dodgeball play in <a href="NOTATION.md">DBN notation</a> → watch it animate ·
    <a href="GLOSSARY.md">glossary</a> · <a href="DRIVING.md">drive it</a> ·
    <a href="https://github.com/storypixel/dodgeball-play-notation">source</a></div>
</header>


<div class="toolbar">
  <label for="example-select">Play:</label>
  <select id="example-select" data-testid="example-select" aria-label="Load an example play">
    <option value="">— pick —</option>
    <option value="pitch-back">Pitch Back</option>
    <option value="three-ball">3 Balls</option>
    <option value="insides">Insides (4 balls)</option>
    <option value="insides-3">Insides (3 balls)</option>
    <option value="outsides">Outsides (4 balls)</option>
    <option value="outsides-3">Outsides (3 balls)</option>
    <option value="kill-left">Kill Left (4 balls)</option>
    <option value="kill-left-3">Kill Left (3 balls)</option>
    <option value="kill-right">Kill Right (4 balls)</option>
    <option value="kill-right-3">Kill Right (3 balls)</option>
    <option value="home">Home</option>
    <option value="away">Away</option>
    <option value="mirror">Mirror</option>
    <option value="middle">Middle</option>
  </select>
  <label for="speed-select">Speed:</label>
  <select id="speed-select" data-testid="speed-select" aria-label="Animation speed">
    <option value="1">1×</option>
    <option value="2" selected>2× (default)</option>
    <option value="3">3×</option>
  </select>
  <button id="code-toggle" class="btn" data-testid="code-toggle" aria-pressed="false" aria-label="Show or hide the notation editor">&lt;/&gt; Code</button>
  <button id="render-btn" class="btn" data-testid="render-button" aria-label="Render the notation">Render ⌘↵</button>
</div>

<main>
  <section class="panel play active" data-panel="play" role="tabpanel" aria-label="Play preview">
    <div class="hint">Live preview — press play to animate.</div>
    <div class="preview-wrap"><div id="stage" data-testid="preview-stage"></div></div>
  </section>
  <section class="panel notation" data-panel="notation" role="tabpanel" aria-label="Notation editor">
    <textarea id="dbn-input" data-testid="dbn-input" aria-label="DBN notation input"
      spellcheck="false" placeholder='[Play "My Play"]&#10;[Balls "U:45 T:2468"]&#10;&#10;1. {They bring it up} T2468-line T4?&#10;2. {Counter} U5@T4!'></textarea>
    <div id="status" class="status" data-testid="status" role="status" aria-live="polite">Loading…</div>
    <pre id="error-panel" class="error-panel" data-testid="error-panel" role="alert" hidden></pre>
  </section>
</main>

<script src="vendor/play-animator.js?v=0767abf54a"></script>
<script src="vendor/dbn.js?v=0767abf54a"></script>
<script src="src/editor.js?v=0767abf54a"></script>
<script>
  // The notation editor is hidden by default; the "</> Code" button reveals it.
  (function () {
    var btn = document.getElementById('code-toggle');
    function setCode(on) {
      document.body.classList.toggle('show-code', on);
      btn.classList.toggle('on', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    }
    btn.addEventListener('click', function () { setCode(!document.body.classList.contains('show-code')); });
    window.DBNEditorUI = { showCode: setCode };
    // deep-link: ?code=1 (or legacy ?tab=notation) opens the editor
    if (/[?&](code=1|tab=notation)/.test(window.location.search)) setCode(true);
  })();
</script>
</body>
</html>
