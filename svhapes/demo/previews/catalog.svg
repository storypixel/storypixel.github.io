<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Svhapes catalog preview</title>
  <desc id="desc">A searchable catalog showing three distinct copyable CSS shapes.</desc>
  <rect width="1200" height="800" fill="#f2f0e7"/>
  <text x="60" y="100" fill="#191a16" font-family="Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="4">THE SHELF</text>
  <text x="60" y="180" fill="#191a16" font-family="Georgia,serif" font-size="72">Pick a silhouette.</text>
  <rect x="60" y="220" width="1080" height="58" rx="29" fill="none" stroke="#191a16" stroke-opacity=".25"/>
  <text x="92" y="257" fill="#5d5e55" font-family="Arial,sans-serif" font-size="20">Search by name, use, or mood</text>
  <g transform="translate(60 330)">
