    <path d="M42 48C70 38 93 57 117 45C143 32 164 56 191 44C219 31 244 55 276 48C295 91 278 119 291 150C305 184 280 210 291 244C278 272 250 264 225 276C198 289 177 265 150 278C123 291 100 266 72 277C39 267 47 234 36 210C25 184 48 161 36 134C24 107 48 80 42 48Z" fill="#5872ff"/>
