<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="/not-sam.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Example Playbook</title>
<style>
  /* Plain reference-page shell, matching /dodging-playbook/. */
  *{box-sizing:border-box}html{-webkit-text-size-adjust:100%}
  body{margin:0;background:#fff;color:#000;font:16px/1.25 "Times New Roman",Times,serif}
  a{color:#0000ee;text-decoration:underline}
  a:visited{color:#551a8b}
  .wrap{width:min(100% - 32px,900px);max-width:900px;margin:0 auto;padding:0 0 40px}
  header.top{padding:0 0 10px;border-bottom:1px solid #000;margin:10px 0 14px;text-align:center}
  header.top h1{font:bold 32px/1.1 "Times New Roman",Times,serif;letter-spacing:0;margin:0 0 6px}
  header.top p{margin:0;color:#000;font-size:16px}
  header.top a{color:#0000ee;text-decoration:underline;font-weight:400}
  .card{border:0;border-top:1px solid #000;border-radius:0;background:transparent;padding:12px 0 0;margin:0 0 22px}
  .card:first-child{border-top:0;padding-top:0}
  .card .dbp{width:100%;max-width:560px;margin:0 auto}
  footer{margin-top:30px;padding-top:10px;border-top:1px solid #000;color:#000;font-size:14px;text-align:center}
  footer a{color:#0000ee;text-decoration:underline}
  @media(max-width:899px){
    body{font-size:18px;line-height:1.35}
    .wrap{width:min(100% - 28px,900px);margin:0 auto;padding:0 0 38px}
    header.top{margin:12px 0 16px}
    header.top h1{font-size:30px}
    header.top p{font-size:17px}
    .card{padding-top:14px;margin-bottom:26px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Example Playbook</h1>
    <p>A tiny sample playbook &mdash; just a few plays, each animated. This isn't a team's real playbook; it's a demo of the format. Test yourself on the <a href="/certification/">Playbook Certification &rarr;</a></p>
  </header>
  <main id="doc"></main>
  <footer>Built on <a href="/dodgeball-play-notation/">DBN</a> &mdash; same engine and plays as the <a href="/dodging-playbook">team playbook</a>.</footer>
</div>
<script src="/dodgeball-play-notation/vendor/play-animator.js"></script>
<script src="/dodgeball-play-notation/vendor/dbn.js"></script>
<script>
  (function(){
    // a small, varied sample: one opener, one 4-ball, one kill, one defense
    var SAMPLE = ['pitch-back','insides','kill-right','away'];
    var doc = document.getElementById('doc');
    var chain = Promise.resolve();
    SAMPLE.forEach(function(id){
      var slot = document.createElement('div'); slot.className = 'card';
      doc.appendChild(slot);
      chain = chain.then(function(){
        return fetch('/dodgeball-play-notation/examples/' + id + '.dbn').then(function(r){ return r.ok ? r.text() : null; }).then(function(t){
          if(!t){ slot.remove(); return; }
          var play = (window.DBN && window.DBN.parse) ? window.DBN.parse(t) : null;
          if(play && window.DodgeballPlay){ DodgeballPlay.mount(slot, play, { autoplay:false, loop:true }); }
          else { slot.remove(); }
        }).catch(function(){ slot.remove(); });
      });
    });
  })();
</script>
</body>
</html>
