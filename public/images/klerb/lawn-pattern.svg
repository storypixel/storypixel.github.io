<svg xmlns="http://www.w3.org/2000/svg" width="160" height="120" viewBox="0 0 160 120">
  <!--
    Hand-drawn grass tufts for the unshipped lane background. Pattern
    repeats horizontally + vertically. Stroke color is green-700 at low
    opacity so it reads as cartography-style topography, not loud
    decoration. Keep tufts loose + asymmetric so it doesn't grid out.
  -->
  <g fill="none" stroke="#15803d" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.18">
    <!-- row 1 -->
    <g transform="translate(22 18)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <g transform="translate(70 14)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -1 5 -2"/>
    </g>
    <g transform="translate(118 22)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <!-- row 2 -->
    <g transform="translate(46 50)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <g transform="translate(96 46)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <g transform="translate(140 54)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <!-- row 3 -->
    <g transform="translate(20 84)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <g transform="translate(74 92)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <g transform="translate(124 86)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <!-- row 4 -->
    <g transform="translate(50 112)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
    <g transform="translate(102 116)">
      <path d="M-4 5 Q-3 -2 -1 -3"/>
      <path d="M0 5 Q0 -3 1 -4"/>
      <path d="M4 5 Q3 -2 5 -3"/>
    </g>
  </g>
</svg>
