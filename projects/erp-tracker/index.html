<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Tracker Mockups - Private</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #f0ede6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .auth-container {
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  
  h1 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #666;
    margin-bottom: 40px;
  }
  
  input {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    border: 1px solid #333;
    background: #1a1a1f;
    color: #f0ede6;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  
  input:focus {
    outline: none;
    border-color: #666;
  }
  
  button {
    width: 100%;
    padding: 16px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: #f0ede6;
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }
  
  button:hover {
    background: #fff;
  }
  
  .error {
    color: #ff6b6b;
    font-size: 14px;
    margin-top: 16px;
  }
  
  #content {
    display: none;
    width: 100%;
  }
  
  iframe {
    width: 100%;
    height: 100vh;
    border: none;
  }
</style>
</head>
<body>

<div class="auth-container" id="auth">
  <h1>Private Access</h1>
  <input type="password" id="password" placeholder="Enter password" />
  <button onclick="checkPassword()">View Mockups</button>
  <div class="error" id="error"></div>
</div>

<div id="content"></div>

<script>
// Simple client-side password check
// Password: erp2026
const CORRECT_HASH = '5a8f90c3f67ef7d8e8c0c8f0e9a7d4f3'; // Simple hash of "erp2026"

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return Math.abs(hash).toString(16);
}

function checkPassword() {
  const input = document.getElementById('password').value;
  const hash = simpleHash(input);
  
  if (hash === CORRECT_HASH) {
    sessionStorage.setItem('erp_auth', 'true');
    showContent();
  } else {
    document.getElementById('error').textContent = 'Incorrect password';
  }
}

function showContent() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML = '<iframe src="mockups.html"></iframe>';
}

// Check if already authenticated
if (sessionStorage.getItem('erp_auth') === 'true') {
  showContent();
}

// Allow Enter key
document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') checkPassword();
});
</script>

</body>
</html>
