<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="/not-sam.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Example Playbook</title>
<style>
  /* Same deliberately plain serif document as the team playbook. */
  *{box-sizing:border-box}html{-webkit-text-size-adjust:100%}
  body{margin:8px;background:#fff;color:#000;font:16px/1.25 "Times New Roman",Times,serif}
  a{color:#0000ee;text-decoration:underline}
  a:visited{color:#551a8b}
  .wrap{max-width:900px;margin:0 auto;padding:0 0 40px}
  header.top{padding:0 0 10px;border-bottom:1px solid #000;margin-bottom:12px;text-align:center}
  header.top h1{font:bold 32px/1.1 "Times New Roman",Times,serif;letter-spacing:0;margin:0 0 6px}
  header.top p{margin:0;color:#000;font-size:16px}
  header.top a{font-weight:400}
  .card{border:0;border-radius:0;background:#fff;padding:14px 0 16px;margin:0}
  .card+.card{border-top:1px solid #000;margin-top:6px}
  .card .dbp{max-width:560px}
  footer{margin-top:26px;padding-top:10px;border-top:1px solid #000;color:#000;font-size:14px;text-align:center}
  @media(max-width:700px){.card .dbp{max-width:none}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Example Playbook</h1>
    <p>A tiny sample playbook &mdash; a few demo plays, each animated. These are not a team's real calls; they show the format: bring shooters to the line, split the targets.</p>
  </header>
  <main id="doc"></main>
  <footer>The demo plays above are written inline on this page.</footer>
</div>
<script src="/dodgeball-play-notation/vendor/play-animator.js"></script>
<script src="/dodgeball-play-notation/vendor/dbn.js"></script>
<script>
  // Demo plays only — authored inline, never the team's real calls. dbn.js
  // auto-mounts every [data-db-play-dbn] element from its text content.
  window.addEventListener('DOMContentLoaded', function(){
    var doc = document.getElementById('doc');
    var PLAYS = [
'[Play "Pitch Back"]\n[Badge "opening rush"]\n[Call "Pitch back"]\n[Desc "Opening rush. The two right players sprint their own lanes to the center-line balls and grab three (one grabs two, one grabs one), then pitch one back to an attacker who steps up and picks off a backpedaling rusher. After the grab the rushers regress straight home."]\n[Setup "rush"]\n\n1. {Rush — the two on the right grab three (2 + 1)} :1.3  U7-line U8-line U8*2 U7* T1-line T2-line T1*2 T2*\n2. {Pitch back — rushers regress as the attacker steps up} :0.9  U8>U5 U78-deep U5-68 T12-deep\n3. {Free look — hit a regressing rusher} :1  U5@T2! U78-back T12-back',
'[Play "Threes"]\n[Badge "3-ball demo"]\n[Call "Threes — 2, 5, 7"]\n[Desc "The base pattern: three ball-holders step to the line together and each picks a different target, so no single block or dodge covers the volley."]\n[Balls "U:246 T:357"]\n\n1. {Three holders take the line} :1  U246-line\n2. {Spread — three different targets} :1.1  U2@T2! U4@T5! U6@T7%',
'[Play "Threes, 1"]\n[Badge "3-ball demo"]\n[Call "Threes — 2, 5, 7 — one fake"]\n[Desc "Same spread, sold with one pump fake in unison before the release. The fake pulls blocks and early dodges; the real throws land a beat later."]\n[Balls "U:345 T:246"]\n\n1. {Three holders take the line} :1  U345-line\n2. {One pump fake in unison} :1.1  U345?\n3. {Release at three different targets} :1  U3@T2! U4@T4! U5@T6%',
'[Play "Threes, wide"]\n[Badge "3-ball demo"]\n[Call "Threes wide — cross it"]\n[Desc "The wide variation: corners and the middle take the line. The middle keeps faking while the corners cross their throws to opposite-side targets."]\n[Balls "U:158 T:357"]\n\n1. {Corners and middle take the line} :1  U158-line\n2. {Middle sells the fake; corners cross} :1.2  U5? U1@T5! U8@T3%',
'[Play "Counter"]\n[Badge "defense demo"]\n[Call "Counter"]\n[Desc "A simple defensive answer: they bring three up and throw; the target dodges. As their attackers fall back off the line, two of our holders step up about halfway and counter the thrower on the run."]\n[Balls "U:37 T:456"]\n\n1. {They bring three up} :1  T456-line T5?\n2. {They throw — we dodge} :0.9  T5@U4%\n3. {They fall back — two counters step up halfway and answer} :1.1  T456-deep U37-deep U3@T5% U7@T5!'
    ];
    PLAYS.forEach(function(src){
      var slot = document.createElement('div');
      slot.className = 'card';
      slot.setAttribute('data-db-play-dbn', '');
      slot.setAttribute('data-loop', '');
      slot.textContent = src;
      doc.appendChild(slot);
    });
    if (window.DBN && window.DBN.autoInit) window.DBN.autoInit();
  });
</script>
</body>
</html>
